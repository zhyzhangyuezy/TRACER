experiment_name: r126_campaign_mem_v3_lstm_proxy_atlasv2_workbook
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_workbook
model:
  type: campaign_mem_v3
  forecast_encoder: lstm
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 3
  similarity_temperature: 0.15
  delta_scale: 0.08
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 18
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  calibration_penalty_weight: 0.08
  grad_clip: 0.85
  retrieval_lr_scale: 1.0
  retrieval_head_lr_scale: 1.0
  forecast_lr_scale: 0.8
  forecast_head_lr_scale: 0.85
  gate_lr_scale: 0.95
  calibration_lr_scale: 0.75
  warmup_ratio: 0.05
  warmdown_ratio: 0.35
  final_lr_frac: 0.2
  final_weight_decay_frac: 0.2
  ema_decay: 0.99
  freeze_forecast_until_epoch: 3
  forecast_ramp_epochs: 2
  freeze_calibration_until_epoch: 6
  calibration_ramp_epochs: 3
  main_pos_weight: auto_sqrt
  aux_pos_weight: auto_sqrt
  focal_gamma: 1.0
  model_selection_mode: balanced
  selection_af_bonus_weight: 0.0
  proxy_event_selection_af_bonus_weight: 0.0
  model_selection_dev_weight: 0.0
  model_selection_proxy_event_weight: 1.0
  proxy_event_family_ratio: 0.34
  checkpoint_average_top_k: 5
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
