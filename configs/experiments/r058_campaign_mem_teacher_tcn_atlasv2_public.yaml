experiment_name: r058_campaign_mem_teacher_tcn_atlasv2_public
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
model:
  type: campaign_mem_v3
  forecast_encoder: dlinear
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  similarity_temperature: 0.15
  delta_scale: 0.25
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 12
  teacher_epochs: 12
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  teacher_lr: 0.001
  teacher_weight_decay: 0.0001
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  calibration_penalty_weight: 0.05
  teacher_weight: 0.15
  teacher_models:
    - type: tcn
      encoder: tcn
      hidden_dim: 96
      embedding_dim: 96
      use_auxiliary: true
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
