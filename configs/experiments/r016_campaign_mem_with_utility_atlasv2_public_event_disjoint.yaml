experiment_name: r016_campaign_mem_with_utility_atlasv2_public_event_disjoint
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
  test_split: test_event_disjoint
  event_disjoint_split: skip_event_copy
model:
  type: campaign_mem
  encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: true
training:
  epochs: 12
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  utility_weight: 0.1
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
