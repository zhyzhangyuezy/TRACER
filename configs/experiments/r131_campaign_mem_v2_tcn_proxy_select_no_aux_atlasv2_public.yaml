experiment_name: r131_campaign_mem_v2_tcn_proxy_select_no_aux_atlasv2_public
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
model:
  type: campaign_mem_v2
  forecast_encoder: tcn
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  similarity_temperature: 0.15
  residual_scale: 0.2
  use_auxiliary: false
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 12
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.0
  contrastive_weight: 0.2
  model_selection_mode: balanced
  selection_af_bonus_weight: 0.0
  proxy_event_selection_af_bonus_weight: 0.0
  model_selection_dev_weight: 1.0
  model_selection_proxy_event_weight: 1.0
  proxy_event_family_ratio: 0.25
  checkpoint_average_top_k: 3
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
