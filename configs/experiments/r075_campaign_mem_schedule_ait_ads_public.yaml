experiment_name: r075_campaign_mem_schedule_ait_ads_public
seed: 7
device: cuda
data:
  dataset_dir: data/ait_ads_public
model:
  type: campaign_mem_v3
  forecast_encoder: dlinear
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  similarity_temperature: 0.15
  delta_scale: 0.25
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 16
  batch_size: 32
  lr: 0.0008
  weight_decay: 0.0002
  betas: [0.8, 0.95]
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  calibration_penalty_weight: 0.05
  grad_clip: 0.75
  retrieval_lr_scale: 0.7
  retrieval_head_lr_scale: 0.85
  forecast_lr_scale: 1.2
  forecast_head_lr_scale: 1.35
  gate_lr_scale: 0.8
  calibration_lr_scale: 1.6
  warmup_ratio: 0.1
  warmdown_ratio: 0.5
  final_lr_frac: 0.15
  final_weight_decay_frac: 0.1
  ema_decay: 0.995
  main_pos_weight: auto_sqrt
  aux_pos_weight: auto_sqrt
  focal_gamma: 1.0
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
