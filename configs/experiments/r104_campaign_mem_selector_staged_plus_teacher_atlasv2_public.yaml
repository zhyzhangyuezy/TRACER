experiment_name: r104_campaign_mem_selector_staged_plus_teacher_atlasv2_public
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
model:
  type: campaign_mem_selector
  forecast_encoder: dlinear
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  similarity_temperature: 0.15
  delta_scale: 0.22
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 20
  teacher_epochs: 10
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  teacher_lr: 0.001
  teacher_weight_decay: 0.0001
  betas: [0.9, 0.999]
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  calibration_penalty_weight: 0.05
  selector_weight: 0.12
  selector_margin: 0.02
  teacher_weight: 0.03
  grad_clip: 0.85
  retrieval_lr_scale: 0.95
  retrieval_head_lr_scale: 1.0
  forecast_lr_scale: 0.9
  forecast_head_lr_scale: 0.95
  gate_lr_scale: 0.95
  calibration_lr_scale: 0.95
  selector_lr_scale: 0.95
  warmup_ratio: 0.05
  warmdown_ratio: 0.35
  final_lr_frac: 0.2
  final_weight_decay_frac: 0.2
  ema_decay: 0.99
  freeze_forecast_until_epoch: 2
  forecast_ramp_epochs: 2
  freeze_calibration_until_epoch: 5
  calibration_ramp_epochs: 3
  model_selection_mode: balanced
  teacher_models:
    - type: tcn
      encoder: tcn
      hidden_dim: 96
      embedding_dim: 96
      use_auxiliary: true
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
