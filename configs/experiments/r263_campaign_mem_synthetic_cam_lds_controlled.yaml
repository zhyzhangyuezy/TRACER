experiment_name: r263_campaign_mem_synthetic_cam_lds_controlled
seed: 7
device: cuda
data:
  dataset_dir: data/synthetic_cam_lds_controlled
model:
  type: campaign_mem
  encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 10
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.45
output:
  dir: outputs/results
