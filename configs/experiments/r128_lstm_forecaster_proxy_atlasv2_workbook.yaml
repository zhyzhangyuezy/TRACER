experiment_name: r128_lstm_forecaster_proxy_atlasv2_workbook
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_workbook
model:
  type: lstm
  encoder: lstm
  hidden_dim: 128
  embedding_dim: 128
  use_auxiliary: true
training:
  epochs: 18
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  auxiliary_weight: 0.25
  grad_clip: 0.85
  warmup_ratio: 0.05
  warmdown_ratio: 0.35
  final_lr_frac: 0.2
  final_weight_decay_frac: 0.2
  ema_decay: 0.99
  model_selection_mode: balanced
  selection_af_bonus_weight: 0.0
  proxy_event_selection_af_bonus_weight: 0.0
  model_selection_dev_weight: 0.0
  model_selection_proxy_event_weight: 1.0
  proxy_event_family_ratio: 0.34
  checkpoint_average_top_k: 5
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
