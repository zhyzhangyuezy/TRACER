experiment_name: r124_campaign_mem_v2_tcn_stabilized_atlasv2_public
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
model:
  type: campaign_mem_v2
  forecast_encoder: tcn
  retrieval_encoder: transformer
  hidden_dim: 128
  embedding_dim: 128
  top_k: 5
  similarity_temperature: 0.15
  residual_scale: 0.2
  use_auxiliary: true
  use_contrastive: true
  use_hard_negatives: true
  use_utility: false
training:
  epochs: 20
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  auxiliary_weight: 0.25
  contrastive_weight: 0.2
  grad_clip: 0.85
  retrieval_lr_scale: 0.95
  retrieval_head_lr_scale: 1.0
  forecast_lr_scale: 0.9
  forecast_head_lr_scale: 0.95
  remaining_lr_scale: 0.95
  warmup_ratio: 0.05
  warmdown_ratio: 0.35
  final_lr_frac: 0.2
  final_weight_decay_frac: 0.2
  ema_decay: 0.99
  freeze_forecast_until_epoch: 2
  forecast_ramp_epochs: 2
  model_selection_mode: balanced
  selection_af_bonus_weight: 0.02
  proxy_event_selection_af_bonus_weight: 0.03
  model_selection_dev_weight: 1.0
  model_selection_proxy_event_weight: 0.75
  proxy_event_family_ratio: 0.25
  checkpoint_average_top_k: 5
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
