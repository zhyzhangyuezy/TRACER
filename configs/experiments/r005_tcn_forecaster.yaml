experiment_name: r005_tcn_forecaster_smoke
seed: 7
device: cuda
data:
  dataset_dir: data/synthetic_cam_lds
model:
  type: tcn
  encoder: tcn
  hidden_dim: 96
  embedding_dim: 96
  use_auxiliary: true
training:
  epochs: 8
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.45
output:
  dir: outputs/results
