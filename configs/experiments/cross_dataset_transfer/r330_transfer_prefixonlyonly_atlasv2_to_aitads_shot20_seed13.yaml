experiment_name: r330_transfer_prefixonlyonly_atlasv2_to_aitads_shot20_seed13
seed: 13
device: cuda
data:
  dataset_dir: data/cross_dataset_transfer/atlasv2_to_aitads_shot20_seed13
  test_split: test
  event_disjoint_split: skip_event_copy
model:
  type: prefix_retrieval
  encoder: transformer
  hidden_dim: 96
  embedding_dim: 96
  top_k: 5
  use_auxiliary: true
  use_contrastive: false
  use_hard_negatives: false
  use_utility: false
training:
  epochs: 8
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results/cross_dataset_transfer
