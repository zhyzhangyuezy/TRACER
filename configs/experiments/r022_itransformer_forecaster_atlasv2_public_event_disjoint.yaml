experiment_name: r022_itransformer_forecaster_atlasv2_public_event_disjoint
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
  test_split: test_event_disjoint
  event_disjoint_split: skip_event_copy
model:
  type: itransformer
  encoder: itransformer
  hidden_dim: 128
  embedding_dim: 128
  use_auxiliary: true
training:
  epochs: 12
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
