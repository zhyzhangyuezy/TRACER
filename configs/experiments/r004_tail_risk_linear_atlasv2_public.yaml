experiment_name: r004_tail_risk_linear_atlasv2_public
seed: 7
device: cuda
data:
  dataset_dir: data/atlasv2_public
model:
  type: tail_risk_linear
  hidden_dim: 64
  embedding_dim: 64
  use_auxiliary: true
training:
  epochs: 10
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  auxiliary_weight: 0.25
metrics:
  target_precision: 0.8
  analog_fidelity_distance_threshold: 0.35
output:
  dir: outputs/results
